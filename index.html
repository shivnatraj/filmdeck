<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c9973a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FilmDeck">
<link rel="manifest" href="/manifest.json">
<title>FilmDeck — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Syne:wght@400;600&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0a0908;
    --surface:#111009;
    --border: #2a2720;
    --amber:  #c9973a;
    --text:   #e8e0d4;
    --muted:  #6b6460;
    --err:    #9b2c2c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 44px 40px 36px;
    width: 100%;
    max-width: 380px;
  }
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-style: italic;
    font-weight: 600;
    color: var(--amber);
    line-height: 1;
    display: block;
  }
  .brand-by {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
    display: block;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-family: 'Fira Code', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: #0e0d0c;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 11px 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--amber); }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
    cursor: pointer;
    user-select: none;
  }
  .remember input[type=checkbox] { accent-color: var(--amber); width: 15px; height: 15px; cursor: pointer; }
  .remember span { font-size: 12px; color: var(--muted); }
  .login-btn {
    width: 100%;
    background: var(--amber);
    color: #0e0d0c;
    border: none;
    border-radius: 5px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px;
    cursor: pointer;
    transition: filter 0.15s;
    text-transform: uppercase;
  }
  .login-btn:hover { filter: brightness(1.1); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    background: rgba(155,44,44,0.15);
    border: 1px solid var(--err);
    border-radius: 4px;
    color: #fc8181;
    font-size: 12px;
    padding: 10px 12px;
    margin-bottom: 16px;
    display: none;
    font-family: 'Fira Code', monospace;
    letter-spacing: 0.3px;
  }
  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Fira Code', monospace;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="brand-name">FilmDeck</span>
    <span class="brand-by">by Shiv</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autocapitalize="none">
  </div>

  <div class="field">
    <label>Password</label>
    <div style="position:relative;">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" style="width:100%;padding-right:40px;">
      <button onclick="togglePw()" type="button" id="eyeBtn" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b6460;font-size:16px;padding:4px;line-height:1;" title="Show/hide password">👁</button>
    </div>
  </div>

  <label class="remember">
    <input type="checkbox" id="rememberMe">
    <span>Remember me for 30 days</span>
  </label>

  <button class="login-btn" id="loginBtn" onclick="login()">Sign In</button>

  <p class="footer-note">FilmDeck · Pre-Production Suite</p>
</div>

<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.textContent = '🙈';
    } else {
      inp.type = 'password';
      btn.textContent = '👁';
    }
    inp.focus();
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, rememberMe })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'Login failed. Please check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }
      window.location.href = '/app.html';
    } catch (e) {
      showError('Connection error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // If already logged in, go to app
  (async () => {
    try {
      const res = await fetch('/api/auth/me');
      if (res.ok) window.location.href = '/app.html';
    } catch {}
  })();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  }
</script>
</body>
</html>
